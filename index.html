<script>
        // --- PASTE YOUR KEYS HERE ---
        const SUPABASE_URL = 'https://ntpmkzrnpfrcrniyfhdu.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_9o6b7G4THa5ayFHeatDeMA_OU2DzXZ9'; // Make sure your full publishable key is here!
        // ----------------------------

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function loadCases() {
            const { data: cases, error } = await supabase
                .from('lab_cases')
                .select('*')
                .eq('case_delivered', false)
                .order('expected_return_date', { ascending: true });

            if (error) { 
                alert("Error loading cases: " + error.message); 
                console.error(error); 
                return; 
            }

            const tbody = document.getElementById('casesTableBody');
            tbody.innerHTML = '';
            
            let openCount = cases.length;
            let overdueCount = 0;
            let dueWeekCount = 0;
            let readyCount = 0;
            const today = new Date();
            today.setHours(0,0,0,0);
            
            const nextWeek = new Date();
            nextWeek.setDate(today.getDate() + 7);

            cases.forEach(c => {
                const expectedDate = new Date(c.expected_return_date + "T00:00:00"); 
                
                if (c.date_returned) {
                    readyCount++;
                } else {
                    if (expectedDate < today) overdueCount++;
                    if (expectedDate >= today && expectedDate <= nextWeek) dueWeekCount++;
                }

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${c.date_sent}</td>
                    <td>${c.patient_name}</td>
                    <td>${c.procedure}</td>
                    <td>${c.lab}</td>
                    <td>${c.expected_return_date}</td>
                    <td>${c.sent_back_to_lab ? 'Sent Back' : (c.date_returned ? 'Returned' : 'At Lab')}</td>
                    <td>
                        <button class="action-btn btn-deliver" onclick="markDelivered(${c.id})">Deliver</button>
                        <button class="action-btn btn-return" onclick="sendBack(${c.id})">Resend to Lab</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('count-open').innerText = openCount;
            document.getElementById('count-overdue').innerText = overdueCount;
            document.getElementById('count-due-week').innerText = dueWeekCount;
            document.getElementById('count-ready').innerText = readyCount;
        }

        async function addCase() {
            const patientName = document.getElementById('patientName').value;
            const procedure = document.getElementById('procedure').value;
            const lab = document.getElementById('labName').value;
            const expectedDate = document.getElementById('expectedDate').value;
            const today = new Date().toISOString().split('T')[0];

            if(!patientName || !expectedDate) return alert("Please fill out patient name and expected date!");

            const { error } = await supabase.from('lab_cases').insert([{
                patient_name: patientName,
                procedure: procedure,
                lab: lab,
                date_sent: today,
                expected_return_date: expectedDate,
                case_delivered: false,
                sent_back_to_lab: false
            }]);

            if (error) {
                alert("Failed to add case: " + error.message);
                console.error(error);
                return;
            }

            document.getElementById('patientName').value = '';
            document.getElementById('expectedDate').value = '';
            loadCases();
        }

        async function markDelivered(id) {
            const { error } = await supabase.from('lab_cases').update({ case_delivered: true }).eq('id', id);
            if (error) alert("Error delivering case: " + error.message);
            loadCases();
        }

        async function sendBack(id) {
            const newExpectedDate = prompt("This case is being sent back to the lab. Please enter the NEW expected return date (YYYY-MM-DD):");
            
            if (newExpectedDate) {
                const { error } = await supabase.from('lab_cases').update({ 
                    sent_back_to_lab: true, 
                    date_returned: null,
                    expected_return_date: newExpectedDate
                }).eq('id', id);
                if (error) alert("Error resending case: " + error.message);
                loadCases();
            } else {
                alert("Action cancelled. A new date is required to resend a case.");
            }
        }

        if (SUPABASE_URL !== 'YOUR_SUPABASE_URL') {
            loadCases();
        }
    </script>
