<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dental Lab Case Tracker</title>
<style>
  :root {
    --blue: #2563eb;
    --blue-dark: #1d4ed8;
    --green: #16a34a;
    --amber: #d97706;
    --gray-bg: #f4f6f8;
    --border: #e2e8f0;
    --text: #1e293b;
    --text-light: #64748b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--gray-bg);
    color: var(--text);
    padding: 24px;
  }
  .container { max-width: 1100px; margin: 0 auto; }
  h1 { font-size: 24px; margin-bottom: 4px; }
  .subtitle { color: var(--text-light); margin-bottom: 24px; font-size: 14px; }

  .card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 24px;
    margin-bottom: 24px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  }
  .card h2 { font-size: 16px; margin: 0 0 16px 0; }

  #status-banner {
    display: none;
    padding: 10px 16px;
    border-radius: 8px;
    margin-bottom: 16px;
    font-size: 14px;
  }
  #status-banner.show { display: block; }
  #status-banner.loading { background: #eff6ff; color: var(--blue-dark); }
  #status-banner.error { background: #fef2f2; color: #b91c1c; }
  #status-banner.success { background: #f0fdf4; color: #15803d; }

  form#add-form {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    align-items: end;
  }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 12px; font-weight: 600; color: var(--text-light); }
  .field input, .field select {
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 14px;
    background: #fff;
  }
  button {
    cursor: pointer;
    border: none;
    border-radius: 6px;
    padding: 9px 16px;
    font-size: 14px;
    font-weight: 600;
  }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
  .btn-primary { background: var(--blue); color: #fff; }
  .btn-primary:hover:not(:disabled) { background: var(--blue-dark); }
  .btn-green { background: var(--green); color: #fff; }
  .btn-amber { background: var(--amber); color: #fff; }
  .btn-small { padding: 5px 10px; font-size: 12px; margin-right: 6px; }

  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border); }
  th { color: var(--text-light); font-size: 12px; text-transform: uppercase; letter-spacing: 0.03em; }
  tr:last-child td { border-bottom: none; }

  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
  }
  .badge-open { background: #fef3c7; color: #92400e; }
  .badge-delivered { background: #dcfce7; color: #166534; }
  .badge-sentback { background: #dbeafe; color: #1e40af; }

  .empty-row td { text-align: center; color: var(--text-light); padding: 24px; }
</style>
</head>
<body>
<div class="container">
  <h1>Dental Lab Case Tracker</h1>
  <p class="subtitle">Cases are stored in and synced directly with the <code>data.json</code> file in this GitHub repository.</p>

  <div id="status-banner"></div>

  <div class="card">
    <h2>Add New Case</h2>
    <form id="add-form">
      <div class="field">
        <label for="patientName">Patient Name</label>
        <input type="text" id="patientName" required>
      </div>
      <div class="field">
        <label for="procedure">Procedure</label>
        <select id="procedure" required>
          <option value="New Invisalign">New Invisalign</option>
          <option value="Refinement Invisalign">Refinement Invisalign</option>
          <option value="Retainers">Retainers</option>
          <option value="Nightguard">Nightguard</option>
        </select>
      </div>
      <div class="field">
        <label for="labName">Lab Name</label>
        <select id="labName" required>
          <option value="Invisalign">Invisalign</option>
          <option value="Glidewell">Glidewell</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="field">
        <label for="dateSent">Date Sent</label>
        <input type="date" id="dateSent" required>
      </div>
      <div class="field">
        <label for="expectedReturn">Expected Return</label>
        <input type="date" id="expectedReturn" required>
      </div>
      <div class="field">
        <button type="submit" class="btn-primary" id="add-btn">Add Case</button>
      </div>
    </form>
  </div>

  <div class="card">
    <h2>All Cases</h2>
    <table>
      <thead>
        <tr>
          <th>Patient</th>
          <th>Procedure</th>
          <th>Lab</th>
          <th>Date Sent</th>
          <th>Expected Return</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="cases-tbody">
        <tr class="empty-row"><td colspan="7">Loading cases&hellip;</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
/* =========================================================================
   CONFIGURATION - fill these in before using the app
   ========================================================================= */
const GITHUB_TOKEN = "PASTE_YOUR_TOKEN_HERE"; // <-- your GitHub Personal Access Token goes here
const GITHUB_OWNER  = "chalionkleeyon";        // GitHub username or org that owns the repo
const GITHUB_REPO   = "scan-log";              // repository name
const GITHUB_BRANCH = "main";                  // branch to read/write data.json on
const FILE_PATH     = "data.json";             // path to the data file in the repo
/* ========================================================================= */

const API_URL = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${FILE_PATH}`;

let cases = [];       // in-memory copy of the case list
let currentSha = null; // the last-known git blob sha for data.json, required to commit updates

const tbody = document.getElementById("cases-tbody");
const banner = document.getElementById("status-banner");
const addForm = document.getElementById("add-form");
const addBtn = document.getElementById("add-btn");

function showBanner(message, type) {
  banner.textContent = message;
  banner.className = `show ${type}`;
}
function hideBanner() {
  banner.className = "";
}

function authHeaders() {
  return {
    "Authorization": `Bearer ${GITHUB_TOKEN}`,
    "Accept": "application/vnd.github+json"
  };
}

// Encode a JS string as base64, safely handling non-ASCII characters (e.g. accented names)
function toBase64(str) {
  return btoa(unescape(encodeURIComponent(str)));
}
// Decode base64 (as returned by GitHub) back into a normal JS string
function fromBase64(b64) {
  return decodeURIComponent(escape(atob(b64)));
}

/* -------------------------------------------------------------------------
   Load data.json from GitHub
   ------------------------------------------------------------------------- */
async function loadCases() {
  showBanner("Loading cases from GitHub...", "loading");
  try {
    const res = await fetch(`${API_URL}?ref=${GITHUB_BRANCH}`, {
      headers: authHeaders()
    });
    if (!res.ok) {
      throw new Error(`GitHub API error (${res.status}): ${res.statusText}`);
    }
    const file = await res.json();
    currentSha = file.sha;
    const jsonText = fromBase64(file.content.replace(/\n/g, ""));
    cases = jsonText.trim() ? JSON.parse(jsonText) : [];
    renderTable();
    hideBanner();
  } catch (err) {
    console.error(err);
    showBanner(`Failed to load cases: ${err.message}`, "error");
    tbody.innerHTML = `<tr class="empty-row"><td colspan="7">Could not load data.json</td></tr>`;
  }
}

/* -------------------------------------------------------------------------
   Save the current "cases" array back to data.json via a new commit
   ------------------------------------------------------------------------- */
async function saveCases(commitMessage) {
  showBanner("Saving to GitHub...", "loading");
  addBtn.disabled = true;
  try {
    const content = toBase64(JSON.stringify(cases, null, 2));
    const res = await fetch(API_URL, {
      method: "PUT",
      headers: {
        ...authHeaders(),
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: commitMessage,
        content: content,
        sha: currentSha,
        branch: GITHUB_BRANCH
      })
    });
    if (!res.ok) {
      const errBody = await res.json().catch(() => ({}));
      throw new Error(errBody.message || `GitHub API error (${res.status})`);
    }
    const result = await res.json();
    currentSha = result.content.sha; // update sha so the next save doesn't conflict
    showBanner("Saved successfully.", "success");
    setTimeout(hideBanner, 2500);
  } catch (err) {
    console.error(err);
    showBanner(`Failed to save: ${err.message}. Reloading latest data...`, "error");
    await loadCases(); // re-sync in case our local copy is now out of date
  } finally {
    addBtn.disabled = false;
  }
}

/* -------------------------------------------------------------------------
   Rendering
   ------------------------------------------------------------------------- */
function badgeClass(status) {
  if (status === "Delivered") return "badge-delivered";
  if (status === "Sent Back to Lab") return "badge-sentback";
  return "badge-open";
}

function renderTable() {
  if (!cases.length) {
    tbody.innerHTML = `<tr class="empty-row"><td colspan="7">No cases yet. Add one above.</td></tr>`;
    return;
  }
  tbody.innerHTML = cases.map((c) => `
    <tr>
      <td>${escapeHtml(c.patientName)}</td>
      <td>${escapeHtml(c.procedure)}</td>
      <td>${escapeHtml(c.labName)}</td>
      <td>${escapeHtml(c.dateSent)}</td>
      <td>${escapeHtml(c.expectedReturn)}</td>
      <td><span class="badge ${badgeClass(c.status)}">${escapeHtml(c.status)}</span></td>
      <td>
        ${c.status !== "Delivered" ? `<button class="btn-small btn-green" onclick="updateStatus('${c.id}', 'Delivered')">Mark Delivered</button>` : ""}
        ${c.status !== "Sent Back to Lab" ? `<button class="btn-small btn-amber" onclick="updateStatus('${c.id}', 'Sent Back to Lab')">Send Back to Lab</button>` : ""}
      </td>
    </tr>
  `).join("");
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str ?? "";
  return div.innerHTML;
}

/* -------------------------------------------------------------------------
   Actions
   ------------------------------------------------------------------------- */
async function updateStatus(id, newStatus) {
  const c = cases.find((c) => c.id === id);
  if (!c) return;
  const previousStatus = c.status;
  c.status = newStatus;
  renderTable();
  await saveCases(`Update ${c.patientName}'s case to "${newStatus}"`);
}

addForm.addEventListener("submit", async (e) => {
  e.preventDefault();

  const newCase = {
    id: `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
    patientName: document.getElementById("patientName").value.trim(),
    procedure: document.getElementById("procedure").value,
    labName: document.getElementById("labName").value,
    dateSent: document.getElementById("dateSent").value,
    expectedReturn: document.getElementById("expectedReturn").value,
    status: "Open"
  };

  cases.push(newCase);
  renderTable();
  addForm.reset();

  await saveCases(`Add new case for ${newCase.patientName}`);
});

/* -------------------------------------------------------------------------
   Kick things off
   ------------------------------------------------------------------------- */
if (GITHUB_TOKEN === "PASTE_YOUR_TOKEN_HERE") {
  showBanner("Set your GitHub token in the GITHUB_TOKEN variable near the top of the <script> tag before using this app.", "error");
  tbody.innerHTML = `<tr class="empty-row"><td colspan="7">Waiting for GitHub token...</td></tr>`;
} else {
  loadCases();
}
</script>
</body>
</html>
