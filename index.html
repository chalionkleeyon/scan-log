<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Scan Log Dashboard</title>
<style>
  body{font-family:system-ui,Arial,sans-serif;margin:0;background:#f4f6f8;color:#222}
  header{background:#4a86e8;color:#fff;padding:16px 24px}
  h1{margin:0;font-size:20px}
  main{max-width:1100px;margin:24px auto;padding:0 16px}
  .tiles{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:24px}
  .tile{flex:1;min-width:160px;background:#fff;border-radius:8px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.1)}
  .tile .num{font-size:32px;font-weight:700}
  .tile.overdue .num{color:#d93025}
  .tile.week .num{color:#e37400}
  .tile.ready .num{color:#188038}
  .tile .lbl{font-size:13px;color:#666;margin-top:4px}
  table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.1)}
  th,td{padding:10px 12px;text-align:left;border-bottom:1px solid #eee;font-size:14px}
  th{background:#f0f3f7}
  button{cursor:pointer;border:none;border-radius:4px;padding:6px 10px;font-size:13px}
  .btn-primary{background:#4a86e8;color:#fff}
  .btn-sm{background:#eef;color:#333;margin-right:4px}
  .btn-danger{background:#fce8e6;color:#d93025}
  form{background:#fff;padding:16px;border-radius:8px;margin-bottom:24px;box-shadow:0 1px 3px rgba(0,0,0,.1);display:none;flex-wrap:wrap;gap:10px}
  form.show{display:flex}
  form input{padding:8px;border:1px solid #ccc;border-radius:4px;font-size:13px}
  .toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .muted{color:#888;font-size:13px}
</style>
</head>
<body>
<header><h1>Dental Scan Log</h1></header>
<main>
  <div class="tiles">
    <div class="tile"><div class="num" id="t-open">–</div><div class="lbl">Open Cases</div></div>
    <div class="tile overdue"><div class="num" id="t-overdue">–</div><div class="lbl">Overdue</div></div>
    <div class="tile week"><div class="num" id="t-week">–</div><div class="lbl">Due This Week</div></div>
    <div class="tile ready"><div class="num" id="t-ready">–</div><div class="lbl">Ready for Delivery</div></div>
  </div>

  <div class="toolbar">
    <button class="btn-primary" onclick="toggleForm()">+ New Case</button>
    <span class="muted" id="status">Loading…</span>
  </div>

  <form id="newForm">
    <input name="patientName" placeholder="Patient name" required>
    <input name="procedure" placeholder="Procedure">
    <input name="lab" placeholder="Lab">
    <input name="dateSent" type="date" title="Date sent">
    <input name="expectedReturnDate" type="date" title="Expected return">
    <button class="btn-primary" type="submit">Save</button>
  </form>

  <table>
    <thead><tr>
      <th>Sent</th><th>Patient</th><th>Procedure</th><th>Lab</th>
      <th>Expected</th><th>Returned</th><th>Delivered</th><th>Back to Lab</th><th></th>
    </tr></thead>
    <tbody id="rows"></tbody>
  </table>
</main>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbywqKmxhFSoyCNUgLiCv1RI_eHmMy1l9NgiXWYUt1Ih9rEn-0CQjd5pTYLpNeIGJOQM/exec';
const API_KEY = '726wash';

async function api(payload){
  const res = await fetch(API_URL,{
    method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify(Object.assign({apiKey:API_KEY}, payload))
  });
  return res.json();
}

function toggleForm(){ document.getElementById('newForm').classList.toggle('show'); }

async function load(){
  document.getElementById('status').textContent = 'Loading…';
  const data = await api({action:'list'});
  if(!data.ok){ document.getElementById('status').textContent = 'Error: '+data.error; return; }
  const s = data.summary;
  t_open.textContent=s.openCases; t_overdue.textContent=s.overdueCases;
  t_week.textContent=s.dueThisWeek; t_ready.textContent=s.readyForDelivery;
  const tb = document.getElementById('rows'); tb.innerHTML='';
  data.cases.forEach(c=>{
    const tr=document.createElement('tr');
    tr.innerHTML =
      `<td>${c.dateSent||''}</td><td>${c.patientName||''}</td><td>${c.procedure||''}</td>`+
      `<td>${c.lab||''}</td><td>${c.expectedReturnDate||''}</td><td>${c.dateReturned||''}</td>`+
      `<td>${c.delivered?'✅':''}</td><td>${c.sentBackToLab?'✅':''}</td>`+
      `<td>`+
        `<button class="btn-sm" onclick="markReturned(${c.row})">Returned</button>`+
        `<button class="btn-sm" onclick="markDelivered(${c.row})">Delivered</button>`+
        `<button class="btn-danger" onclick="archive(${c.row})">Archive</button>`+
      `</td>`;
    tb.appendChild(tr);
  });
  document.getElementById('status').textContent = data.cases.length+' active case(s)';
}

async function markReturned(row){ await api({action:'update',row,dateReturned:new Date().toISOString().slice(0,10)}); load(); }
async function markDelivered(row){ await api({action:'update',row,delivered:true}); load(); }
async function archive(row){ if(confirm('Archive this case?')){ await api({action:'delete',row}); load(); } }

document.getElementById('newForm').addEventListener('submit', async e=>{
  e.preventDefault();
  const f=e.target, payload={action:'create'};
  new FormData(f).forEach((v,k)=>{ if(v) payload[k]=v; });
  await api(payload); f.reset(); toggleForm(); load();
});

load();
</script>
</body>
</html>
